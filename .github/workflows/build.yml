name: Build
on:
  push:
    branches:
      - master
      - develop
      - release
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  static:
    name: Lint + Análise estática (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: phpstan, phpmd, phpcs

      - name: Lint de sintaxe (php -l)
        run: bash build/lint.sh

      # PHPStan/PHPMD/PHPCS são ADVISORY: como o framework Joomla não é carregado
      # na CI, há ruído inerente. As regras J6 determinísticas vivem no gate
      # (validacao-pre-master.yml). continue-on-error mantém visibilidade.
      - name: PHPStan (advisory)
        continue-on-error: true
        run: phpstan analyse -c phpstan.neon.dist --no-progress src

      - name: PHPMD (advisory)
        continue-on-error: true
        run: phpmd src text ./phpmd.xml

      - name: PHPCS PSR-12 (advisory)
        continue-on-error: true
        run: phpcs --standard=phpcs.xml.dist -q src

  tests:
    name: Testes do motor JSON-LD (PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Instalar dependências de teste
        working-directory: tests
        run: composer install --no-interaction --no-progress

      - name: Rodar PHPUnit
        working-directory: tests
        run: vendor/bin/phpunit

  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Clone completo: melhora a relevância da análise (histórico/SCM blame).

      # A configuração (projectKey, organization, sources) vive em
      # sonar-project.properties na raiz e é lida automaticamente pelo scanner.
      # Requer o secret SONAR_TOKEN configurado no repositório.
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
