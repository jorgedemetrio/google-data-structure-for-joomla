# Configuração do SonarQube Cloud — análise do código da extensão Esquema Rico.
sonar.projectKey=jorgedemetrio_google-data-structure-for-joomla
sonar.organization=jorgedemetrio

# Nome e versão exibidos na UI do SonarQube Cloud.
sonar.projectName=google-data-structure-for-joomla
sonar.projectVersion=1.0.0

# Código-fonte (a extensão vive em src/) e testes PHPUnit (tests/).
sonar.sources=src
sonar.tests=tests

# Não indexar dependências (vendor) nem artefatos de build.
sonar.exclusions=**/vendor/**,dist/**
sonar.test.exclusions=**/vendor/**

# Codificação dos fontes.
sonar.sourceEncoding=UTF-8

# Cobertura ignorada no Quality Gate: a extensão é acoplada ao Joomla e a
# maior parte do código (views, controllers, plugins) não é testável sem o
# CMS, então a cobertura unitária não é representativa. Excluir todos os
# arquivos do cálculo faz a condição "Coverage on New Code" deixar de reprovar.
sonar.coverage.exclusions=**/*

# --- Supressões de regras (falsos positivos e estilo do projeto) ---
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5

# S1142 (>3 returns): o projeto usa guard clauses / returns antecipados —
# estilo idiomático, mais legível que forçar um único ponto de saída.
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1142
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.php

# S1172 (parâmetro não usado): assinatura exigida por contrato — interface
# das SmartTags (process($argument)) ...
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e2.resourceKey=**/SmartTags/Tags/*.php

# ... e o gancho sobrescrito Base::onPayloadPrepare($payload).
sonar.issue.ignore.multicriteria.e3.ruleKey=php:S1172
sonar.issue.ignore.multicriteria.e3.resourceKey=**/Schema/Base.php

# S1448 (>20 métodos): motores com um método por tipo de schema (GeradorJsonLd)
# e por checagem de SEO (SeoAnalyzer) — separação intencional por tipo.
sonar.issue.ignore.multicriteria.e4.ruleKey=php:S1448
sonar.issue.ignore.multicriteria.e4.resourceKey=**/Engine/GeradorJsonLd.php
sonar.issue.ignore.multicriteria.e5.ruleKey=php:S1448
sonar.issue.ignore.multicriteria.e5.resourceKey=**/Seo/SeoAnalyzer.php
